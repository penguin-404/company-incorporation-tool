version: '3.8'

services:
  #Database
  db:
    image: postgres:15-alpine
    container_name: incorporation_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  #Backend
  backend:
    build: ./backend
    container_name: incorporation_api
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=5000
    depends_on:
      - db

  #Frontend
  frontend:
    build: ./frontend
    container_name: incorporation_ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data: